name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alwasl_digital_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d alwasl_digital_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alwasl_digital_test?schema=public
      EXPOSE_OTP_IN_RESPONSE: 'true'
      ALLOW_UNDELIVERED_OTP: 'true'
      ENABLE_FAKE_PAYMENTS: 'false'
      ENABLE_MOCK_WAHO: 'false'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Check high severity npm audit findings
        run: npm audit --omit=dev --audit-level=high

      - name: Check high severity Bun audit findings
        run: bun audit --audit-level=high

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck E2E
        run: bun run typecheck:e2e

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

      - name: Migrate database
        run: bun run db:migrate

      - name: Seed database
        run: bun run db:seed

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Playwright E2E
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
